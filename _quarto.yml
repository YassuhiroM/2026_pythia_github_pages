project:
  type: website
  output-dir: docs
  resources:
    - index.html
    - .nojekyll
    - assets/

website:
  title: "Pythia"
  navbar:
    logo: assets/images/pythia-mark.svg
    left:
      - text: "Pythia"
        href: "#top"
      - text: "Project details"
        href: "#project-details"
      - text: "Video demo"
        href: "#video-demo"
      - text: "Team"
        href: "#team"
      - text: "Awards"
        href: "#awards"
    right:
      - text: "EN"
        href: "/2026_pythia_github_pages/en/"
      - text: "ES"
        href: "/2026_pythia_github_pages/es/"
  page-footer:
    left: "Pythia · Master’s Final Project at UCM"
    right: "Built with Quarto for GitHub Pages"

format:
  html:
    theme: cosmo
    css: assets/css/theme.css
    toc: false
    smooth-scroll: true
    link-external-newwindow: true
    grid:
      body-width: 1100px
      sidebar-width: 0px
      margin-width: 0px

execute:
  freeze: auto
