project:
  type: website
  output-dir: docs
  resources:
    - index.html
    - .nojekyll
    - assets/

website:
  title: "Pythia"
  navbar:
    logo: assets/images/pythia-mark.svg
    left:
      - text: "English"
        menu:
          - text: "Home"
            href: en/index.qmd
          - text: "Product overview"
            href: en/product-overview.qmd
          - text: "Business problem"
            href: en/business-problem.qmd
          - text: "Data and methodology"
            href: en/data-methodology.qmd
          - text: "Modeling"
            href: en/modeling.qmd
          - text: "Results and impact"
            href: en/results-impact.qmd
          - text: "Video demo"
            href: en/video-demo.qmd
          - text: "Team"
            href: en/team.qmd
          - text: "Awards"
            href: en/awards-recognition.qmd
          - text: "Contact"
            href: en/contact.qmd
      - text: "Español"
        menu:
          - text: "Inicio"
            href: es/index.qmd
          - text: "Visión general"
            href: es/product-overview.qmd
          - text: "Problema de negocio"
            href: es/business-problem.qmd
          - text: "Datos y metodología"
            href: es/data-methodology.qmd
          - text: "Modelado"
            href: es/modeling.qmd
          - text: "Resultados e impacto"
            href: es/results-impact.qmd
          - text: "Demo en video"
            href: es/video-demo.qmd
          - text: "Equipo"
            href: es/team.qmd
          - text: "Premios"
            href: es/awards-recognition.qmd
          - text: "Contacto"
            href: es/contact.qmd
    right:
      - text: "GitHub"
        href: "https://github.com/your-username/pythia"
      - text: "LinkedIn"
        href: "https://www.linkedin.com/in/your-linkedin/"
  page-footer:
    left: "Pythia · Master’s Final Project at UCM"
    right: "Built with Quarto for GitHub Pages"

format:
  html:
    theme: cosmo
    css: assets/css/theme.css
    toc: false
    smooth-scroll: true
    link-external-newwindow: true
    grid:
      body-width: 1100px
      sidebar-width: 0px
      margin-width: 0px

execute:
  freeze: auto
