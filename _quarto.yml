project:
  type: website
  output-dir: docs
  resources:
    - index.html
    - .nojekyll
    - assets/

website:
  title: "Pythia"
  page-footer:
    left: "Pythia · Master’s Final Project at UCM"
    right: "Built with Quarto for GitHub Pages"

format:
  html:
    theme: cosmo
    css: assets/css/theme.css
    toc: false
    smooth-scroll: true
    link-external-newwindow: true
    grid:
      body-width: 1100px
      sidebar-width: 0px
      margin-width: 0px

execute:
  freeze: auto
